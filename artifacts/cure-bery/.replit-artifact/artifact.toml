kind = "web"
previewPath = "/"
title = "CureBery - Platform Perawat Online"
version = "1.0.0"
id = "artifacts/cure-bery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20735

[services.development]
run = "pnpm --filter @workspace/cure-bery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cure-bery", "run", "build" ]
publicDir = "artifacts/cure-bery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20735"
BASE_PATH = "/"
