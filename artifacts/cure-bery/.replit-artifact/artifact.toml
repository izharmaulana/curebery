kind = "web"
previewPath = "/"
title = "CureBery - Platform Perawat Online"
version = "1.0.0"
id = "artifacts/cure-bery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20735

[services.env]
PORT = "20735"
BASE_PATH = "/"

[services.development]
run = "pnpm --filter @workspace/cure-bery run dev"

[services.production]
build = "pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/cure-bery run build"
run = "pnpm --filter @workspace/api-server run start"

[services.production.env]
NODE_ENV = "production"
BASE_PATH = "/"
